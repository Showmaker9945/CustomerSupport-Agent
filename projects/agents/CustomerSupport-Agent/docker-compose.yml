services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: customer-support-agent
    ports:
      - "${HOST_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      APP_NAME: ${APP_NAME:-CustomerSupport-Agent}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DEBUG: ${DEBUG:-false}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8000}
      LLM_PROVIDER: ${LLM_PROVIDER:-qwen}
      LLM_MODEL: ${LLM_MODEL:-qwen-plus}
      LLM_HIGH_QUALITY_MODEL: ${LLM_HIGH_QUALITY_MODEL:-qwen-max}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./data/support.db}
      POSTGRES_URI: ${POSTGRES_URI:-postgresql://support_user:support_pass@postgres:5432/support?sslmode=disable}
      LANGGRAPH_PERSISTENCE_BACKEND: ${LANGGRAPH_PERSISTENCE_BACKEND:-memory}
      LANGGRAPH_USE_POSTGRES: ${LANGGRAPH_USE_POSTGRES:-false}
      AUTO_SETUP_POSTGRES: ${AUTO_SETUP_POSTGRES:-true}
      CHROMA_PERSIST_DIR: ./data/chroma_db
      COLLECTION_NAME: ${COLLECTION_NAME:-faq_knowledge_base}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      ENABLE_RERANKER: ${ENABLE_RERANKER:-false}
      RAG_TOP_K: ${RAG_TOP_K:-4}
      RAG_FUSION_K: ${RAG_FUSION_K:-60}
      RAG_VECTOR_WEIGHT: ${RAG_VECTOR_WEIGHT:-0.6}
      RAG_KEYWORD_WEIGHT: ${RAG_KEYWORD_WEIGHT:-0.4}
      KNOWLEDGE_BASE_PATH: ./data/knowledge_base
      MEMORY_TYPE: ${MEMORY_TYPE:-sqlite}
      MAX_CONVERSATION_HISTORY: ${MAX_CONVERSATION_HISTORY:-20}
      SESSION_TIMEOUT_HOURS: ${SESSION_TIMEOUT_HOURS:-24}
      SENTIMENT_THRESHOLD: ${SENTIMENT_THRESHOLD:-0.3}
      HANDOFF_THRESHOLD: ${HANDOFF_THRESHOLD:--0.5}
      MAX_AI_TURNS: ${MAX_AI_TURNS:-10}
      MAX_REQUESTS_PER_MINUTE: ${MAX_REQUESTS_PER_MINUTE:-60}
      MAX_WS_CONNECTIONS_PER_USER: ${MAX_WS_CONNECTIONS_PER_USER:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - support-network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: pgvector/pgvector:pg16
    container_name: support-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-support}
      POSTGRES_USER: ${POSTGRES_USER:-support_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-support_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    networks:
      - support-network

networks:
  support-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
